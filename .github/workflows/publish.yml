name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build -c Release /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test dotflow.sln -c Release --no-build

      - name: Pack
        run: |
          for proj in src/dotflow.Core \
                      src/dotflow.Dashboard \
                      src/dotflow.Persistence.InMemory \
                      src/dotflow.Persistence.PostgreSQL \
                      src/dotflow.Extensions.MediatR \
                      src/dotflow.Extensions.Yaml; do
            dotnet pack $proj -c Release --no-build \
              /p:Version=${{ steps.version.outputs.VERSION }} \
              -o ./nupkgs
          done

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
